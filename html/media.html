<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Studentorkestern Snösvängets hemsida.">
    <meta name="author" content="Simon Nilsson">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="print.css" media="print">
    <script src="js/jquery-4.0.0.min.js.js"></script>
    <script src="js/jquery-ui-1.14.2/jquery-ui.js"></script>
    <script defer src="js/index.js"></script>
    <script defer src="js/media.js"></script>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <title>Studentorkestern Snösvänget</title>
</head>
<body>
    <header id="header">
        <h1 id="site-logo" class="clickable">
            <a id="logo-text" href="index.html">
                STUDENTORKESTERN SNÖSVÄNGET OCH <br> BALETTEN SPARKETTEN
            </a>
        </h1>
        <nav id="nav-bar">
            <button id="hamburger" aria-label="Öppna meny">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul id="nav-links">
                <li class="clickable"><a href="/about.html">OM SNÖSVÄNGET</a></li>
                <li class="clickable"><a href="/member.html">BLI MEDLEM</a></li>
                <li class="clickable"><a href="/contact.html">KONTAKT</a></li>
                <li class="clickable"><a href="/media.html">MEDIA</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="video-slide">
            <video class="snow-video" width="1000" controls>
                    <source src="video/vivalavida1.mp4" type="video/mp4"> 
            </video>
        </div>
        <div class="slideshow-container">
            <div class="slides fade">
                <div class="numbertext">1 / 3</div>
                    <img src="images/medlemsbild.jpg" alt="Bild på medlemmar i Snösvänget." style="width:100%">
                <div class="text">Medlemmar i Snösvänget.</div>
            </div>
            <div class="slides fade">
                <div class="numbertext">2 / 3</div>
                    <img src="images/spelning.jpg" alt="Konsert med Snösvänget i lärarhuset." style="width:100%">
                <div class="text">Bild från Shååven i lärarhuset.</div>
            </div>
            <div class="slides fade">
                <div class="numbertext">3 / 3</div>
                    <img src="images/start_bg.png" alt="Snösvänget spelar musik på ett torg." style="width:100%">
                <div class="text">Snösvänget spelar musik på ett torg under en festival.</div>
            </div>
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>
        <div id="dots">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>

    </main>

    <footer id="footer">
        <img id="footer-image" src="images/Footer.png" alt="Image for footer background.">
        <div id="snowfooter">
            <img id="snowfootlogo" src="images/blackwhite_snow.png" alt="Svartvit Snösvänget-logga">
            <p id="footer-logo-text-1">S N Ö S V Ä N G E T</p>
            <br>
            <p id="footer-logo-text-2"> U M E Å</p>
            <br>
            <p id="footer-logo-text-3">C 2026</p>
        </div>
    </footer>
</body>
</html>
